name: firebases
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.1.6
  workmanager: ^0.5.2
  flutter_timezone: ^4.0.0
  cloud_firestore: ^5.6.0
  flutter_launcher_icons: ^0.14.3
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  http: ^1.3.0
  chart_sparkline: ^1.0.12
  syncfusion_flutter_charts: ^20.4.48


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/image/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app.png"
